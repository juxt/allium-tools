name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rust-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p allium-cli
          else
            cargo build --release --target ${{ matrix.target }} -p allium-cli
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../allium-${{ matrix.target }}.tar.gz allium

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: allium-${{ matrix.target }}
          path: allium-${{ matrix.target }}.tar.gz

  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build WASM parser
        run: |
          cargo install wasm-pack
          wasm-pack build crates/allium-wasm --target nodejs --out-dir ../../packages/allium-parser-wasm
          node -e "const p=require('./packages/allium-parser-wasm/package.json');p.name='allium-parser-wasm';p.scripts={build:'echo ok',test:'echo ok',lint:'echo ok'};require('fs').writeFileSync('./packages/allium-parser-wasm/package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build release artifacts
        run: npm run release:artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: allium-release-artifacts
          path: artifacts/*

  publish-release:
    needs: [rust-binaries, build-and-release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/allium-*/*.tar.gz
            artifacts/allium-release-artifacts/*

  publish-crates:
    needs: rust-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p allium-parser
          cargo publish -p allium-cli

  update-homebrew:
    needs: rust-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: allium-*-*-*
          path: artifacts

      - name: Compute checksums
        id: checksums
        run: |
          for target in aarch64_apple_darwin x86_64_apple_darwin aarch64_unknown_linux_gnu x86_64_unknown_linux_gnu; do
            tarball="artifacts/allium-${target//_/-}/allium-${target//_/-}.tar.gz"
            sha=$(sha256sum "$tarball" | awk '{print $1}')
            echo "${target}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          aarch64_apple_darwin: ${{ steps.checksums.outputs.aarch64_apple_darwin }}
          x86_64_apple_darwin: ${{ steps.checksums.outputs.x86_64_apple_darwin }}
          aarch64_unknown_linux_gnu: ${{ steps.checksums.outputs.aarch64_unknown_linux_gnu }}
          x86_64_unknown_linux_gnu: ${{ steps.checksums.outputs.x86_64_unknown_linux_gnu }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/juxt/homebrew-allium.git" tap
          cd tap

          FORMULA="Formula/allium.rb"

          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$FORMULA"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            key=$(echo "$target" | tr '-' '_')
            sha="${!key}"
            sed -i "/allium-${target}\.tar\.gz/{n;s/sha256 \"[^\"]*\"/sha256 \"${sha}\"/;}" "$FORMULA"
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git commit -m "allium ${VERSION}"
          git push
