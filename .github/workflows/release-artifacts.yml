name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rust-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p allium-cli
          else
            cargo build --release --target ${{ matrix.target }} -p allium-cli
          fi

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../allium-${{ matrix.target }}.tar.gz allium

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/allium.exe -DestinationPath allium-${{ matrix.target }}.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: allium-${{ matrix.target }}
          path: |
            allium-${{ matrix.target }}.tar.gz
            allium-${{ matrix.target }}.zip

  # Build an arm64 macOS Homebrew bottle from the release binary, so
  # `brew install/upgrade allium` POURS a prebuilt package instead of running
  # the install from source in Homebrew's build sandbox — which aborts on macOS
  # Tahoe when it realpaths a TCC-protected ~/Documents (juxt/allium#42).
  # The binary is :any_skip_relocation, so one bottle built on the OLDEST arm64
  # runner (sonoma) covers all newer macOS via Homebrew's OS-version fallback.
  #
  # arm64-only on purpose: x86_64 macOS bottles require the macos-13 Intel
  # runner, which is scarce/deprecated and stalled the release indefinitely.
  # macOS Tahoe is arm64-centric and Intel macOS was already un-bottled, so Intel
  # keeps source-building as before. Linux has no TCC sandbox crash and needs no
  # bottle.
  bottles:
    needs: rust-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14 # oldest arm64 runner (sonoma) → covers sonoma..latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: allium-${{ matrix.target }}
          path: bin-artifact

      - name: Build bottle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ROOT_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}"
          mkdir -p bottle-out
          scripts/build-bottle.sh \
            "${{ matrix.target }}" "$VERSION" \
            "bin-artifact/allium-${{ matrix.target }}.tar.gz" \
            "$ROOT_URL" bottle-out | tee "bottle-out/meta-${{ matrix.target }}.txt"

      - name: Upload bottle
        uses: actions/upload-artifact@v7
        with:
          name: allium-bottle-${{ matrix.target }}
          path: bottle-out/*

  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Build WASM parser
        run: |
          cargo install wasm-pack
          wasm-pack build crates/allium-wasm --target nodejs --out-dir ../../packages/allium-parser-wasm
          node -e "const p=require('./packages/allium-parser-wasm/package.json');p.name='allium-parser-wasm';p.scripts={build:'echo ok',test:'echo ok',lint:'echo ok'};require('fs').writeFileSync('./packages/allium-parser-wasm/package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build release artifacts
        run: npm run release:artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: allium-release-artifacts
          path: artifacts/*

  publish-release:
    needs: [rust-binaries, build-and-release, bottles]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish GitHub release
        # The `allium-*/*.tar.gz` glob attaches both the binary tarballs and the
        # `allium-bottle-*/` bottle tarballs (the bottle do root_url points here).
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/allium-*/*.tar.gz
            artifacts/allium-*/*.zip
            artifacts/allium-release-artifacts/*

  publish-crates:
    needs: rust-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p allium-parser
          cargo publish -p allium-cli

  publish-npm:
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    # id-token: write lets npm publish --provenance mint a signed build
    # attestation; contents: read is needed because job-level permissions
    # override the workflow default (so checkout can still read the repo).
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      # allium-lsp bundles the WASM parser into its dist/, so the parser must be
      # built before the package is built — same prelude as build-and-release.
      - name: Build WASM parser
        run: |
          cargo install wasm-pack
          wasm-pack build crates/allium-wasm --target nodejs --out-dir ../../packages/allium-parser-wasm
          node -e "const p=require('./packages/allium-parser-wasm/package.json');p.name='allium-parser-wasm';p.scripts={build:'echo ok',test:'echo ok',lint:'echo ok'};require('fs').writeFileSync('./packages/allium-parser-wasm/package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Install dependencies
        run: npm ci

      - name: Build allium-lsp
        run: npm run --workspace packages/allium-lsp build

      # Skip if this version is already on the registry so re-running a
      # release (or tagging without bumping the npm version) doesn't fail the
      # whole workflow on "cannot publish over previously published versions".
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="$(node -p "require('./packages/allium-lsp/package.json').version")"
          if npm view "allium-lsp@${VERSION}" version >/dev/null 2>&1; then
            echo "allium-lsp@${VERSION} is already published — skipping."
          else
            npm publish --workspace packages/allium-lsp --access public --provenance
          fi

  update-homebrew:
    needs: [rust-binaries, bottles]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Compute checksums
        id: checksums
        run: |
          for target in aarch64_apple_darwin x86_64_apple_darwin aarch64_unknown_linux_gnu x86_64_unknown_linux_gnu; do
            tarball="artifacts/allium-${target//_/-}/allium-${target//_/-}.tar.gz"
            sha=$(sha256sum "$tarball" | awk '{print $1}')
            echo "${target}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Assemble bottle block
        id: bottles
        run: |
          # Each bottles-job leg wrote meta-<target>.txt with `tag=` / `sha256=`.
          block="  bottle do"
          block="${block}\n    root_url \"https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}\""
          found=0
          for meta in artifacts/allium-bottle-*/meta-*.txt; do
            [ -f "$meta" ] || continue
            tag=$(sed -n 's/^tag=//p' "$meta")
            sha=$(sed -n 's/^sha256=//p' "$meta")
            [ -n "$tag" ] && [ -n "$sha" ] || continue
            block="${block}\n    sha256 cellar: :any_skip_relocation, ${tag}: \"${sha}\""
            found=1
          done
          block="${block}\n  end"
          echo "found=${found}" >> "$GITHUB_OUTPUT"
          printf '%b' "$block" > bottle_block.txt
          echo "Bottle block:"; cat bottle_block.txt

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          BOTTLES_FOUND: ${{ steps.bottles.outputs.found }}
          aarch64_apple_darwin: ${{ steps.checksums.outputs.aarch64_apple_darwin }}
          x86_64_apple_darwin: ${{ steps.checksums.outputs.x86_64_apple_darwin }}
          aarch64_unknown_linux_gnu: ${{ steps.checksums.outputs.aarch64_unknown_linux_gnu }}
          x86_64_unknown_linux_gnu: ${{ steps.checksums.outputs.x86_64_unknown_linux_gnu }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/juxt/homebrew-allium.git" tap

          FORMULA="tap/Formula/allium.rb"

          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$FORMULA"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            key=$(echo "$target" | tr '-' '_')
            sha="${!key}"
            sed -i "/allium-${target}\.tar\.gz/{n;s/sha256 \"[^\"]*\"/sha256 \"${sha}\"/;}" "$FORMULA"
          done

          # Replace any existing bottle block, then insert the freshly assembled
          # one after the `version` line. Done in Ruby so the multi-line block
          # injects cleanly.
          if [ "${BOTTLES_FOUND}" = "1" ]; then
            BLOCK="$(cat bottle_block.txt)" ruby -i -e '
              src = ARGF.read
              src = src.sub(/^  bottle do\n.*?^  end\n/m, "")
              block = ENV["BLOCK"]
              src = src.sub(/^(  version "[^"]*"\n)/) { "#{$1}\n#{block}\n" }
              print src
            ' "$FORMULA"
          fi

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/allium.rb"
          git commit -m "allium ${VERSION}"
          git push
